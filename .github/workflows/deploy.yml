name: Backend Deploy

on:
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    if: github.ref_name == 'main' || github.ref_name == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USER }}/sublumen:stology-be-${{ github.ref_name }}

  deploy:
    if: github.ref_name == 'main' || github.ref_name == 'develop'
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout environment configuration
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: recursive

      - name: Select environment configuration
        id: target
        shell: bash
        run: |
          case "$GITHUB_REF_NAME" in
            main)
              echo "config_dir=main" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "config_dir=dev" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: $GITHUB_REF_NAME"
              exit 1
              ;;
          esac

      - name: Prepare environment upload directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -eu
            cd /home/ubuntu/stology-app
            mkdir -p env .deploy-env/run-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload branch environment file
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: config/${{ steps.target.outputs.config_dir }}/.env
          target: /home/ubuntu/stology-app/.deploy-env/run-${{ github.run_id }}-${{ github.run_attempt }}
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -eu
            cd /home/ubuntu/stology-app

            case "${{ github.ref_name }}" in
              main)
                SERVICE="be-main"
                ENV_FILE="env/be-main.env"
                IMAGE="${{ secrets.DOCKER_USER }}/sublumen:stology-be-main"
                ;;
              develop)
                SERVICE="be-dev"
                ENV_FILE="env/be-dev.env"
                IMAGE="${{ secrets.DOCKER_USER }}/sublumen:stology-be-develop"
                ;;
              *)
                echo "Unsupported branch: ${{ github.ref_name }}"
                exit 1
                ;;
            esac

            STAGED_ENV=".deploy-env/run-${{ github.run_id }}-${{ github.run_attempt }}/.env"
            test -s "$STAGED_ENV"
            mv "$STAGED_ENV" "$ENV_FILE"
            chmod 600 "$ENV_FILE"
            rmdir ".deploy-env/run-${{ github.run_id }}-${{ github.run_attempt }}"

            echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
            docker pull "$IMAGE"
            docker compose up -d --force-recreate "$SERVICE"
            docker image prune -f
