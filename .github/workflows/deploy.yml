name: Backend Deploy

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'BE/**'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REF_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USER }}/sublumen:stology-be-${{ env.REF_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      REF_NAME: ${{ github.ref_name }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd /home/ubuntu/stology-app

            if [ "$REF_NAME" = "main" ]; then
              echo "Deploying MAIN branch..."
              docker pull ${{ secrets.DOCKER_USER }}/sublumen:stology-be-main
              docker compose up -d --force-recreate backend-main
            elif [ "$REF_NAME" = "develop" ]; then
              echo "Deploying DEVELOP branch..."
              docker pull ${{ secrets.DOCKER_USER }}/sublumen:stology-be-develop
              docker compose up -d --force-recreate backend-develop
            fi

            docker image prune -f
