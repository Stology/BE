version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: stology-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: stology
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: stology-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
