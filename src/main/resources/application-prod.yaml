spring:
  application:
    name: BE

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_REST_API_KEY}
            client-secret: ${KAKAO_REST_API_SECRET}
            redirect-uri: "http://${BASE_URL}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname, account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PW}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PW}

jwt:
  token:
    secretKey: ${JWT_SECRET_KEY}
    # 랜덤 문자열 뽑는 명령어(cmd) : powershell -Command "-join ((65..90)+(97..122)+(48..57) | Get-Random -Count 64 | % {[char]$_})"
    expiration:
      access: ${JWT_ACCESS_EXPIRATION:3600000}
      refresh: ${JWT_REFRESH_EXPIRATION:604800000}
